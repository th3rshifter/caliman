apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caliman-app
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: caliman
  source:
    repoURL: https://github.com/th3rshifter/caliman
    path: k8s
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true