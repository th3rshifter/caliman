services:
  caliman-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caliman-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      APP_LOG_LEVEL: debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - caliman-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: caliman-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - caliman-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: caliman-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - caliman-net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: caliman-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - caliman-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  caliman-net:
    driver: bridge
