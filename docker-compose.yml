name: caliman

#Anchors
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

# Services
services:
  caliman-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: caliman-app:local
    restart: unless-stopped
    init: true
    read_only: true
    user: "10001:10001"
    ports:
      - "127.0.0.1:8080:8080"

    # Используем env_file для dev-окружения вместо inline-переменных.
    # Создайте файл .env.app (и добавьте его в .gitignore).
    env_file:
      - path: .env.app
        required: false        # Позволяет запустить без файла (fallback — defaults ниже)
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-debug}
      APP_PORT: ${APP_PORT:-8080}

    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev

    <<: *default-security

    # Healthcheck переключён с curl на python — curl не нужен в образе.
    # Теперь можно убрать curl из Dockerfile.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - backend
      - monitoring

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 128M

    logging: *default-logging

  prometheus:
    image: prom/prometheus:v3.3.1
    restart: unless-stopped
    init: true
    user: "65534:65534"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  #Grafana
  grafana:
    image: grafana/grafana:12.0.0
    restart: unless-stopped
    init: true
    user: "472:472"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    <<: *default-security
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging
  
  # Node Exporter
  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    init: true
    pid: host
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    <<: *default-security
    read_only: true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - monitoring
    profiles:
      - node-exporter
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    logging: *default-logging
secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
volumes:
  prometheus-data:
  grafana-data:
networks:
  backend:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    internal: true