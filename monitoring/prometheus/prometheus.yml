global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "caliman-app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "caliman-app:8080"

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"
